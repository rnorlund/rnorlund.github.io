<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MTG Card Quilt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="stage">
      <canvas id="quilt"></canvas>
      <div class="stage-hud">
        <span id="slotStatus" class="slot-status">0 / 4</span>
      </div>
    </section>

    <aside class="panel">
      <header class="panel-header">
        <h1>Card Quilt</h1>
        <p class="hint">Click a card to place it in the next open slot. Click a placed card on the quilt to remove it.</p>
      </header>

      <div class="controls">
        <label class="control">
          <span>Grid</span>
          <select id="gridSize">
            <option value="2" selected>2 × 2</option>
            <option value="3">3 × 3</option>
            <option value="4">4 × 4</option>
            <option value="5">5 × 5</option>
            <option value="6">6 × 6</option>
          </select>
        </label>

        <label class="control">
          <span>Waviness <em id="waveReadout">0.12</em></span>
          <input type="range" id="waviness" min="0" max="0.4" step="0.005" value="0.12" />
        </label>

        <label class="control">
          <span>Wave speed <em id="speedReadout">1.0×</em></span>
          <input type="range" id="speed" min="0" max="4" step="0.05" value="1" />
        </label>

        <label class="control">
          <span>Wave density <em id="freqReadout">1.8</em></span>
          <input type="range" id="frequency" min="0.4" max="5" step="0.1" value="1.8" />
        </label>

        <div class="control-row swatch-row">
          <label class="swatch">
            <input type="color" id="threadColor" value="#e6d2a4" />
            <span>Thread</span>
          </label>
          <label class="swatch">
            <input type="color" id="buttonColor" value="#f2e6c8" />
            <span>Cabochon</span>
          </label>
        </div>

        <div class="control-row">
          <button id="pause" type="button">Pause</button>
          <button id="randomize" type="button">Fill randomly</button>
          <button id="clear" type="button">Clear</button>
        </div>
      </div>

      <div class="pool-header">
        <h2>Card pool</h2>
        <button id="shufflePool" type="button" class="link-btn">Shuffle pool</button>
      </div>
      <div class="pool" id="pool"></div>
    </aside>
  </main>

  <script type="module" src="quilt.js"></script>
</body>
</html>
